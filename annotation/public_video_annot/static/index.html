<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LifeBench 标注</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header>
      <div>
        <h1>LifeBench 标注</h1>
        <p id="stats"></p>
        <p id="online-users" style="font-size:12px;color:#666"></p>
      </div>
      <div class="controls">
        <span id="current-user" class="user-chip"></span>
        <select id="dataset"></select>
        <select id="status">
          <option value="pending">待我标注</option>
          <option value="problem">模型分歧优先</option>
          <option value="annotated">已标注</option>
          <option value="">全部</option>
          <option value="risk">模型判定有风险</option>
          <option value="normal">模型判定无风险</option>
        </select>
        <button id="reload">刷新</button>
        <button id="export">导出</button>
        <button id="batch-trim" class="batch-trim-btn">批量裁切</button>
        <button id="manage-users" class="secondary" style="font-size:12px;padding:4px 8px">管理用户</button>
        <button id="logout" class="secondary" style="font-size:12px;padding:4px 8px">退出</button>
      </div>
    </header>
    <main>
      <aside id="list"></aside>
      <div class="detail-wrapper">
        <section id="detail">
          <div class="empty">请选择一个视频</div>
        </section>

      </div>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
